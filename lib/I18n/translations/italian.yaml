STR_README: "ReadMe"
STR_README_APP_DESC: "Guida rapida alle funzionalità chiave di vCodex"
STR_README_GITHUB_HINT: "Maggiori dettagli su GitHub @franssjz"
STR_README_TOPIC_SHORTCUTS: "Personalizza Home e App"
STR_README_SYNC_DAY_BODY: "Sync Day mantiene le funzionalità basate sulla data nel giorno giusto.\n\nQuesto dispositivo potrebbe dimenticare la data reale dopo la sospensione, quindi Sync Day la aggiorna tramite Wi-Fi.\n\nUso semplice:\n- imposta il fuso orario una volta\n- premi Ottieni Giorno prima della prima sessione di lettura della giornata\n- Formato data cambia solo come appare la data\n- Mostra giorno mostra o nasconde la data nell'intestazione\n- Promemoria SyncDay ti avvisa dopo diverse aperture senza una sincronizzazione recente\n\nSe salti Sync Day per troppo tempo, statistiche, serie e obiettivi potrebbero essere salvati nel giorno sbagliato."
STR_README_STATS_BODY: "Reading Stats traccia il tempo, le sessioni, i libri finiti e i giorni con obiettivo raggiunto.\n\nRegole importanti:\n- usa Sync Day se vuoi che le funzionalità basate sulla data rimangano corrette\n- una sessione deve durare almeno 3 minuti per essere conteggiata\n\nSchermate utili:\n- Statistiche di lettura: totali e riepilogo\n- Mappa termica di lettura: vista calendario mensile\n- Giorno di lettura: un giorno specifico\n- Profilo di lettura: ultimi 7 giorni\n\nImpostazioni utili in Impostazioni > App > Statistiche di lettura:\n- Obiettivo quotidiano cambia l'obiettivo usato per serie e obiettivi\n- Mostra dopo la lettura apre il riepilogo dopo una sessione conteggiata\n- Esporta / Importa / Reimposta ti permettono di gestire il file delle statistiche\n\nOpzionale: i libri dentro /ignore_stats/ sono ignorati dal sistema di statistiche."
STR_README_PROFILE_BODY: "Il Profilo di Lettura è un'istantanea di 7 giorni delle tue abitudini di lettura.\n\nValuta quattro assi:\n- Abitudine: quanto spesso leggi e hai raggiunto l'obiettivo giornaliero\n- Stabilità: quanto uniformemente la lettura è stata distribuita durante la settimana\n- Coinvolgimento: quanto spesso sei tornato per un'altra sessione\n- Profondità: se le tue sessioni erano per lo più brevi, medie o lunghe\n\nIl punteggio totale è solo un riepilogo. I quattro assi sono quelli che spiegano davvero il tuo andamento."
STR_README_BOOKMARKS_BODY: "Mentre un libro è aperto:\n- Se tieni premuto il tasto OK in basso, la pagina corrente viene salvata come segnalibro.\n- Se premi rapidamente lo stesso tasto, si apre un menu per controllare rapidamente i segnalibri.\n- Per eliminare un segnalibro, tieni premuto di nuovo lo stesso tasto mentre il segnalibro è selezionato."
STR_README_FAVORITES_BODY: "Preferiti ti permette di fissare i libri a cui vuoi accedere rapidamente.\n\nCome funziona:\n- apri Preferiti > Sfoglia file\n- scorri le cartelle come un normale browser di file\n- ogni libro può essere contrassegnato o meno con la casella di controllo a destra\n\nGestione dei preferiti:\n- Preferiti > Ordina preferiti ti permette di scegliere manualmente quali libri appaiono per primi\n- tieni premuto Seleziona su un preferito lì se vuoi rimuoverlo, poi conferma\n- non c'è un limite fisso a quanti preferiti puoi mantenere"
STR_README_FLASHCARDS_BODY: "Flashcards studia i mazzi CSV salvati sulla scheda SD.\n\nSezioni principali:\n- Apri carica un mazzo dall'archivio\n- Recenti riapre i mazzi usati di recente\n- Statistiche elenca i mazzi noti e il loro progresso\n- Impostazioni permette di scegliere la modalità di studio e la dimensione della sessione\n\nModalità di studio:\n- Dovuto costruisce una sessione di revisione finita prima dalle carte dovute e poi da quelle non viste\n- Programmato costruisce una sessione mescolata finita da tutto il mazzo\n- Infinito ignora la dimensione della sessione e continua finché non esci manualmente\n- Sequenziale usa ogni carta nell'ordine CSV e finisce dopo l'ultima carta\n\nCome funzionano le opzioni:\n- La modalità di studio decide quali carte entrano nella sessione\n- La dimensione della sessione decide quante di quelle carte vengono usate\n- Se la dimensione è Tutte, Dovuto usa tutte le carte dovute più quelle non viste, e Programmato usa tutto il mazzo\n- Infinito e Sequenziale ignorano la dimensione della sessione\n\nDurante la revisione:\n- Capovolgi scambia fronte e retro\n- Prossimo salta la carta corrente senza assegnare un punteggio\n- Successo segna la carta come corretta\n- Fallimento segna la carta come fallita e la ripropone prima\n\nSe si tiene premuto Seleziona su un mazzo dentro Statistiche, è possibile eliminare le statistiche delle flashcard di quel mazzo dopo conferma."
STR_README_SLEEP_BODY: "Sospensione ti permette di scegliere cosa mostra il dispositivo mentre è sospeso.\n\nPuoi:\n- scegliere una cartella per la sospensione\n- visualizzare in anteprima le immagini\n- scegliere l'ordine casuale o sequenziale\n- usare cartelle i cui nomi iniziano con sleep_, come sleep_books o sleep_manga\n\nSe vuoi umori o temi diversi, crea altre cartelle sleep_ e alternale."
STR_README_SHORTCUTS_BODY: "In Impostazioni > App > Scorciatoie puoi organizzare Home e App.\n\nPuoi:\n- decidere se ogni app appartiene a Home o App\n- mostrare o nascondere ogni scorciatoia\n- cambiare l'ordine degli elementi in entrambe le schermate\n\nQuesto è il modo più semplice per mantenere il launcher pulito."
STR_README_SETTINGS_BODY: "Alcune impostazioni meritano una rapida spiegazione:\n\nLettore\n- Anti-aliasing testo rende il testo più fluido, ma potrebbe costare un po' di velocità\n- Intensità del testo cambia quanto appare scuro il testo\n- Modalità di aggiornamento del lettore cambia lo stile di aggiornamento; Auto è l'impostazione sicura predefinita\n- Famiglia e dimensione del font di solito contano più del tema dell'interfaccia per il comfort\n\nApp\n- Mostra giorno mostra o nasconde la data nell'intestazione\n- Formato data cambia solo come viene visualizzata la data\n- Obiettivo quotidiano influisce su serie, statistiche e obiettivi\n- Mostra dopo la lettura apre Statistiche di lettura dopo una sessione conteggiata\n- Abilita obiettivi attiva o disattiva il sistema degli obiettivi\n- Popup obiettivi controlla solo i popup di sblocco\n\nSchermo\n- Tema interfaccia cambia solo l'aspetto dell'interfaccia"
STR_README_ACHIEVEMENTS_BODY: "Gli obiettivi premiano traguardi come serie di obiettivi, tempo di lettura, libri finiti e segnalibri.\n\nPer mantenerli corretti, usa Sync Day regolarmente, perché gli obiettivi dipendono dallo stesso modello di giorno di Statistiche di lettura.\n\nImpostazioni utili in Impostazioni > App > Obiettivi:\n- Abilita obiettivi attiva o disattiva il sistema\n- Popup obiettivi decide se mostrare i popup di sblocco\n- Sincronizza con stat. prec. ricostruisce i progressi dalle tue statistiche esistenti\n\nAnche l'Obiettivo quotidiano è importante qui, perché molti obiettivi dipendono dai giorni con obiettivo e dalle serie di obiettivi."
STR_README_IF_FOUND_BODY: "Un'app che aiuta qualcuno a restituire il dispositivo se va perso.\n\nScrivere su questo dispositivo è doloroso, quindi se aggiungi un file chiamato if_found.txt alla scheda SD, il suo contenuto verrà mostrato quando questa app viene aperta.\n\nPuoi scriverci qualsiasi cosa: una frase, un numero di telefono, un'email..."
